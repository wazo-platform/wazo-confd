paths:
  /voicemails/transcription:
    get:
      summary: Get voicemail transcription configuration
      description: |
        Retrieve the voicemail transcription configuration for the tenant.

        Returns the current transcription settings, including whether automatic
        transcription is enabled for the tenant's voicemails.
      operationId: get_voicemail_transcription_config
      tags:
        - voicemails
        - transcription
      parameters:
        - $ref: '#/parameters/tenantuuid'
      responses:
        '200':
          description: Voicemail transcription configuration
          schema:
            $ref: '#/definitions/VoicemailTranscriptionConfig'
        '404':
          $ref: '#/responses/NotFoundError'

    put:
      summary: Update voicemail transcription configuration
      description: |
        Update the voicemail transcription configuration for the tenant.

        This endpoint is idempotent - calling it multiple times with the same
        configuration will not create duplicates.

        When transcription is enabled:
        - All new voicemails will be automatically queued for transcription
        - Transcription occurs asynchronously via the configured backend
        - Results are stored and associated with the voicemail record

        When transcription is disabled:
        - New voicemails will not be transcribed
        - Existing transcripts are retained unless explicitly deleted
      operationId: update_voicemail_transcription_config
      tags:
        - voicemails
        - transcription
      parameters:
        - $ref: '#/parameters/tenantuuid'
        - name: body
          in: body
          required: true
          description: Voicemail transcription configuration
          schema:
            $ref: '#/definitions/VoicemailTranscriptionConfig'
      responses:
        '204':
          description: Configuration updated successfully
        '400':
          $ref: '#/responses/UpdateError'
        '404':
          $ref: '#/responses/NotFoundError'

definitions:
  VoicemailTranscriptionConfig:
    type: object
    properties:
      enabled:
        type: boolean
        description: |
          Enable or disable automatic transcription of voicemails for this tenant.
        default: false
        example: true
    required:
      - enabled
