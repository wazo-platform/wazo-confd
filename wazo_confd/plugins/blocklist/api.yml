paths:
  /users/{user_uuid}/blocklist/numbers:
    head:
      operationId: lookup_blocklisted_number
      summary: Check if a number is part of a user's blocklist
      description: '**Required ACL:** `confd.blocklist.read`'
      tags:
      - blocklist
      parameters:
        - $ref: '#/parameters/user_uuid'
        - name: number_exact
          in: query
          type: string
          description: E.164 number string to lookup(exact match) in the user's blocklist
          required: true
      responses:
        '204':
          description: successful match
          headers:
            Wazo-Blocklist-Number-Label:
              type: string
              description: Label of the blocklisted number
        '400':
          $ref: '#/responses/Error'
        '404':
          $ref: '#/responses/NotFoundError'
      
  /blocklist/numbers:
    get:
      operationId: list_blocklist_numbers
      summary: List all blocklisted numbers in tenant
      description: '**Required ACL:** `confd.blocklist.read`'
      tags:
      - blocklist
      parameters:
        - $ref: '#/parameters/tenantuuid'
        - $ref: '#/parameters/recurse'
        - $ref: '#/parameters/order'
        - $ref: '#/parameters/direction'
        - $ref: '#/parameters/limit'
        - $ref: '#/parameters/offset'
        - $ref: '#/parameters/search'
        - name: user_uuids_filter
          in: query
          type: string
          description: comma-separated list of user UUIDs to filter blocklisted numbers
          required: false
        - name: number
          in: query
          type: string
          description: filter blocklisted numbers by a number string
          required: false
        - name: label
          in: query
          type: string
          description: filter blocklisted numbers by a label string
          required: false
      responses:
        '200':
          description: Blocklisted numbers list
          schema:
            $ref: '#/definitions/BlocklistNumbersListResponse'
        '400':
          $ref: '#/responses/Error'

  /blocklist/numbers/{blocklist_number_uuid}:
    get:
      operationId: get_blocklist_number
      summary: Get blocklist number by uuid
      description: '**Required ACL:** `confd.blocklist.read`'
      tags:
      - blocklist
      parameters:
        - $ref: '#/parameters/tenantuuid'
        - $ref: '#/parameters/blocklist_number_uuid'
      responses:
        '200':
          description: Blocklisted number
          schema:
            $ref: '#/definitions/BlocklistNumber'
        '404':
          $ref: '#/responses/NotFoundError'
parameters:
  blocklist_number_uuid:
    name: blocklist_number_uuid
    in: path
    type: string
    format: uuid
    description: UUID of the blocklisted number
    required: true
definitions:
  BlocklistNumber:
    type: object
    description: a blocklisted number
    properties:
      uuid:
        type: string
        description: Blocklisted Number UUID
        readOnly: true
      number:
        type: string
        description: The phone number (in E.164 representation if possible)
      label:
        type: string
        description: The label of the blocklisted number
      user_uuid:
        type: string
        format: uuid
        description: UUID of the user to whom the blocklisted number belongs
        readOnly: true
      tenant_uuid:
        type: string
        format: uuid
        description: UUID of the tenant to which the blocklisted number belongs
        readOnly: true
    required:
      - number
  BlocklistNumbersListResponse:
    type: object
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/BlocklistNumber'
      total:
        type: integer
        readOnly: true
        description: Total number of blocklisted numbers
      filtered:
        type: integer
        readOnly: true
        description: Number of blocklisted numbers after filtering
